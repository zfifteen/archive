name: Phi-Filter CI

on:
  push:
    branches: [ main ]
    paths:
      - 'app-build/phi-filter/**'
      - '.github/workflows/phi-filter-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app-build/phi-filter/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app-build/phi-filter/requirements.txt
        pip install -r app-build/phi-filter/requirements-dev.txt
        
    - name: Run tests
      run: |
        cd app-build/phi-filter
        python -m pytest tests/
