name: Simplex-Anchor Experiment

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full

permissions:
  contents: read

jobs:
  simplex-anchor-keygen:
    name: Keygen A/B Test (${{ matrix.bits }}bit, ${{ matrix.condition }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        bits: [1024, 2048]
        condition: [baseline, simplex, A4, euler, self_dual]
        mode: [quick]  # Override for full runs
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Determine trial count
        id: trials
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ github.event.inputs.run_mode }}" == "full" ]]; then
            echo "count=10000" >> $GITHUB_OUTPUT
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "count=500" >> $GITHUB_OUTPUT
            echo "mode=quick" >> $GITHUB_OUTPUT
          fi
      
      - name: Run keygen experiment
        run: |
          python -m cli.keygen_ab \
            --bits ${{ matrix.bits }} \
            --condition ${{ matrix.condition }} \
            --trials ${{ steps.trials.outputs.count }} \
            --seed 1337 \
            --out-dir results/keygen_simplex_anchor/${{ matrix.condition }}_${{ matrix.bits }}
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: keygen-${{ matrix.condition }}-${{ matrix.bits }}bit-${{ steps.trials.outputs.mode }}
          path: results/keygen_simplex_anchor/${{ matrix.condition }}_${{ matrix.bits }}
          retention-days: 30
  
  analyze-keygen-results:
    name: Analyze Keygen Results
    needs: simplex-anchor-keygen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # For commenting on PRs
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results/keygen_simplex_anchor/
          pattern: keygen-*
          merge-multiple: true
      
      - name: Generate analysis report
        run: |
          python scripts/analyze_keygen_results.py \
            --results-dir results/keygen_simplex_anchor \
            --output experiments/reports/simplex_anchor_summary.md
        continue-on-error: true
      
      - name: Check acceptance criteria
        id: acceptance
        run: |
          python scripts/check_acceptance_criteria.py \
            --config configs/simplex_anchor_experiment.json \
            --results-dir results/keygen_simplex_anchor
        continue-on-error: true
      
      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: keygen-analysis-report
          path: experiments/reports/simplex_anchor_summary.md
          retention-days: 90
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'experiments/reports/simplex_anchor_summary.md';
            
            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Simplex-Anchor Experiment Results\n\n${report}`
              });
            }
  
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Run simplex_anchor tests
        run: |
          python -m pytest tests/test_simplex_anchor.py -v --tb=short
      
      - name: Run keygen_ab tests
        run: |
          python -m pytest tests/test_keygen_ab.py -v --tb=short
      
      - name: Generate coverage report
        run: |
          python -m pytest tests/test_simplex_anchor.py tests/test_keygen_ab.py \
            --cov=src/z5d/simplex_anchor \
            --cov=src/experiments/keygen_ab \
            --cov=src/analysis \
            --cov-report=xml \
            --cov-report=html
        continue-on-error: true
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30
        if: always()

  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy
      
      - name: Check code formatting with Black
        run: |
          black --check src/z5d/simplex_anchor.py \
                       src/experiments/keygen_ab.py \
                       src/analysis/bootstrap.py \
                       src/analysis/distributions.py \
                       cli/keygen_ab.py
        continue-on-error: true
      
      - name: Lint with flake8
        run: |
          flake8 src/z5d/simplex_anchor.py \
                 src/experiments/keygen_ab.py \
                 src/analysis/bootstrap.py \
                 src/analysis/distributions.py \
                 --max-line-length=100 \
                 --ignore=E203,W503
        continue-on-error: true
