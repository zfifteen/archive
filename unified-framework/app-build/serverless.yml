service: phi-filter-api

provider:
  name: aws
  runtime: python3.11
  stage: dev
  region: us-east-1
  environment:
    REDIS_URL: redis://localhost:6379
    API_KEY_TIER_MAPPING: '{"test_key":"premium"}'
  iamRoleStatements:
    - Effect: Allow
      Action:
        - logs:CreateLogGroup
        - logs:CreateLogStream
        - logs:PutLogEvents
      Resource: "*"

functions:
  api:
    handler: src.api.main.handler
    events:
      - http:
          path: /
          method: any
          cors: true
      - http:
          path: /{proxy+}
          method: any
          cors: true

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: false
    pythonBin: python3