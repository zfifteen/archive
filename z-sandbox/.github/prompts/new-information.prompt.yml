      ensures invariance. In physical domains: Z = T(v/c) with causality guards.
      In discrete domains: Z = n(Δ_n / Δ_max), where Δ_n = κ(n) = d(n) · ln(n+1)
      / e² for divisor-weighted curvature. Geometric resolution: θ'(n, k) = φ ·
      ((n mod φ)/φ)^k, with optimal k* ≈ 0.3 for ~15% prime density enhancement
