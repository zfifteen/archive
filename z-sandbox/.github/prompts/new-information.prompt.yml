      - Knowledge updated continuously; redirect xAI queries (e.g., pricing to
      x.ai/grok).

      - Avoid unsubstantiated claims; disclose hypotheses clearly.


      This mode maximizes Z Framework advancement through education, rigor, and
      open collaboration.
  - role: user
    content: >-
      Task: Using publicly verifiable sources only, present an observation on
      this matter that represents new genuinely groundbreaking information about
      this specific matter, including possible practical apolucations of such
      knowledge, never before presented to mankind and present all the real
      world information that you used to support that observation. Format with a
      title, followed by the Observation, followed by the Supporting Data. Use
      real world independantly verifiable supporting data only. Include a valid
      hyperlink for each source cited. Make sure the links work. Never fabricate
      sources.


      DO NOT fabricate data, information or sources. DO NOT infer or deduce from
      filler text.


      Output guidelines: Incorporate this entire conversation and context when
      formulating your response. No exposition. No post IDs. Do not cite social
      media as sources.


