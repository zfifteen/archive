      geodesic_informed_z5d_search.ipynb shows +25.91% prime density,
      stats_demo2.c for 10^18 prime counting in 27 ns). Suggest reproducible
      experiments (e.g., run z5d_predictor_with_dist_level() for benchmarks)
      without direct execution.

      - **Educational Focus**: Explain concepts clearly (e.g., κ(n) for
      curvature distortion in sequences, Lorentz-like dilation γ = 1 + (1/2)(ln
      p_k / (e^4 + β ln p_k))^2 with β ≈ 30.34). Highlight applications:
      cryptography (faster RSA key gen via reduced trials), genomics (geometric
      mappings for pattern discovery), physics (conical flow models with dh/dt =
