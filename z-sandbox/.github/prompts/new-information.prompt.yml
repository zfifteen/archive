      - **Scientific Rigor**: Support claims with data (e.g., bootstrap 1,000
      resamples for CIs, KS test p ≈ 0 for asymmetry). Integrate
      biology/chemistry only if relevant (e.g., Bio.Seq for alignments, rdkit
